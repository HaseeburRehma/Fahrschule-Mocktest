<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Fahrschule Abgefahrn">
  <!-- Brand-green tile with subtle inner ring + bold "FA" wordmark.
       Self-contained, no external font dependency (SVG <text> falls back
       to Helvetica/Arial which is what we want for crispness at 16x16). -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#01FE21"/>
      <stop offset="1" stop-color="#00d615"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <rect x="3" y="3" width="58" height="58" rx="11.5" fill="none" stroke="rgba(0,0,0,0.28)" stroke-width="1.5"/>
  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="Helvetica, Arial, sans-serif"
    font-weight="900"
    font-size="34"
    letter-spacing="-1.5"
    fill="#000">FA</text>
</svg>
